<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>今天吃啥</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#E8590C;--primary-dark:#D9480F;--primary-light:#FF8C42;
  --bg:#F8F8F8;--card:#fff;--text:#1a1a1a;--text2:#888;--text3:#bbb;
  --border:#F0F0F0;--red:#F03E3E;--green:#40C057;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 4px rgba(0,0,0,.04);
  --safe-b:env(safe-area-inset-bottom,12px);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;user-select:none;overflow-x:hidden;
}
.app{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100dvh;position:relative}

/* Header */
.header{position:sticky;top:0;z-index:90;background:linear-gradient(135deg,#E8590C,#D9480F);color:#fff;padding:14px 16px;box-shadow:0 2px 16px rgba(233,89,12,.2)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:19px;font-weight:700}
.header-badge{background:rgba(255,255,255,.22);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600}
.main{flex:1;padding-bottom:calc(var(--safe-b) + 120px)}
.page{display:none;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Search */
.search-bar{padding:10px 14px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid #eee;border-radius:24px;font-size:14px;background:var(--card);outline:none;color:var(--text)}
.search-wrap .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#ccc}

/* Category tabs */
.cat-tabs{display:flex;gap:8px;padding:6px 14px 12px;overflow-x:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;background:var(--card);color:var(--text2);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}

/* Filter */
.filter-row{display:flex;align-items:center;gap:8px;padding:0 14px 10px}
.filter-chip{padding:4px 10px;border-radius:14px;font-size:11px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s}
.filter-chip.active{background:#FFF4EC;border-color:var(--primary-light);color:var(--primary);font-weight:600}

/* Dish card */
.dish-list{padding:0 14px}
.dish-card{display:flex;gap:12px;background:var(--card);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.dish-img{width:100px;min-height:100px;flex-shrink:0;position:relative;overflow:hidden;border-radius:8px 0 0 8px;background:#f0f0f0}
.dish-img img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.dish-img .fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;position:absolute;inset:0}
.dish-info{flex:1;padding:12px 12px 12px 0;display:flex;flex-direction:column;justify-content:center;min-width:0}
.dish-name{font-size:15px;font-weight:700;margin-bottom:4px}
.dish-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.dish-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#F5F5F5;color:var(--text2)}
.dish-tag.reheat{background:#E8F5E9;color:#2E7D32}
.dish-tag.noreheat{background:#FFF3E0;color:#E65100}
.dish-foot{display:flex;align-items:center;justify-content:space-between}
.dish-reheat{font-size:11px}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-ctrl button{width:28px;height:28px;border-radius:50%;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;line-height:1}
.btn-minus{background:#F0F0F0;color:#888}
.btn-plus{background:var(--primary);color:#fff}
.qty-ctrl button:active{transform:scale(.85)}
.qty-num{font-size:14px;font-weight:700;color:var(--primary);min-width:16px;text-align:center}
.empty{text-align:center;padding:48px 0;color:var(--text3);font-size:14px}

/* Cart bar */
.cart-bar{position:fixed;bottom:calc(var(--safe-b) + 50px);left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:var(--card);border-top:1px solid var(--border);z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.cart-bar-inner{display:flex;align-items:center;padding:8px 14px;gap:12px;cursor:pointer}
.cart-icon{width:42px;height:42px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:20px}
.cart-icon.has-items{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.cart-info{flex:1}
.cart-title{font-size:14px;font-weight:600}
.cart-hint{font-size:11px;color:var(--text2)}

/* Cart drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;display:none}
.drawer-overlay.show{display:block}
.drawer{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);max-width:480px;width:100%;bottom:0;z-index:151;background:var(--card);border-radius:20px 20px 0 0;max-height:65vh;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.12)}
.drawer.open{transform:translateX(-50%) translateY(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid #f5f5f5}
.drawer-header h3{font-size:16px;font-weight:700}
.btn-clear{font-size:12px;color:var(--text2);border:none;background:none;cursor:pointer}
.drawer-body{flex:1;overflow-y:auto;padding:8px 18px}
.drawer-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5}
.drawer-item:last-child{border-bottom:none}
.drawer-item .di-name{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drawer-item .di-qty{display:flex;align-items:center;gap:5px}
.drawer-item .di-qty button{width:24px;height:24px;font-size:13px}
.drawer-item .di-qty span{font-size:14px;font-weight:700;color:var(--primary)}
.drawer-item .di-portion{font-size:11px;padding:3px 8px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2)}
.drawer-item .di-portion.eat-tonight{background:#FFF4EC;color:#D9480F;border-color:#FFD4BA}
.drawer-item .di-portion.pack-tomorrow{background:#E8F5E9;color:#2E7D32;border-color:#B9DFC4}
.drawer-footer{padding:14px 18px calc(var(--safe-b) + 8px);border-top:1px solid #f5f5f5;display:flex;align-items:center;justify-content:space-between}
.drawer-total{font-size:15px;font-weight:700}
.drawer-total span{font-size:12px;color:var(--text2);font-weight:400}
.drawer-actions{display:flex;gap:8px}
.btn-copy,.btn-done{padding:10px 18px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-copy{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
.btn-done{background:var(--primary);color:#fff}

/* Blind box */
.bb-section{padding:16px;text-align:center}
.bb-icon{font-size:64px;display:block;margin-bottom:4px}
.bb-icon.rolling{animation:shake .5s ease-in-out}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-12deg)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(8deg)}}
.bb-section h3{font-size:18px;font-weight:700;margin:4px 0}
.bb-section p{font-size:13px;color:var(--text2)}
.flavor-label{font-size:14px;font-weight:600;margin:16px 0 8px}
.flavor-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.flavor-chip{padding:8px 16px;border-radius:20px;font-size:13px;border:1.5px solid var(--border);background:var(--card);cursor:pointer}
.flavor-chip.active{background:#FFF4EC;border-color:var(--primary);color:var(--primary);font-weight:600}
.count-picker{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.count-picker button{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:18px;cursor:pointer;font-weight:700}
.count-picker .pick-num{font-size:30px;font-weight:800;color:var(--primary)}
.btn-roll{display:inline-block;padding:14px 56px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(233,89,12,.3);letter-spacing:2px}
.btn-roll:disabled{opacity:.5}
.bb-result{margin-top:24px}
.bb-result h4{font-size:15px;font-weight:700;margin-bottom:12px}
.bb-result-dishes{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:14px}
.bb-res-dish{background:var(--card);border:2px solid var(--primary-light);border-radius:var(--radius-sm);padding:8px 14px;font-size:14px;font-weight:600;color:var(--primary);animation:popIn .3s ease forwards;opacity:0}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.btn-add-bb{padding:10px 24px;border-radius:24px;border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer}

/* Admin */
.admin-lock{text-align:center;padding:48px 24px}
.admin-lock .lock-icon{font-size:52px;display:block;margin-bottom:12px}
.admin-lock input{width:100%;max-width:260px;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;text-align:center;outline:none;margin-bottom:12px}
.btn-unlock{display:block;width:100%;max-width:260px;margin:0 auto;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.lock-error{color:var(--red);font-size:13px;display:none;margin-top:6px}
.admin-panel{display:none;padding:14px}
.admin-panel.show{display:block}
.admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.admin-top h3{font-size:16px;font-weight:700}
.btn-logout{font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer}
.add-form{display:flex;gap:8px;margin-bottom:14px}
.add-form input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:22px;font-size:14px;outline:none}
.add-form button{padding:10px 18px;border:none;border-radius:22px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-upload{padding:10px 12px!important;border-radius:22px!important;background:#f0f0f0!important;color:#555!important;font-size:16px!important}
.admin-stats{display:flex;gap:8px;margin-bottom:14px}
.admin-stat{flex:1;text-align:center;padding:10px 6px;background:var(--card);border-radius:var(--radius-sm)}
.admin-stat .as-num{font-size:22px;font-weight:800;color:var(--primary)}
.admin-stat .as-label{font-size:11px;color:var(--text2)}
.admin-dish-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto}
.admin-dish-item{display:flex;align-items:center;gap:8px;background:var(--card);padding:10px 12px;border-radius:var(--radius-sm);font-size:14px}
.admin-dish-item .ad-name{flex:1;font-weight:500}
.ad-badge{font-size:10px;padding:2px 8px;border-radius:10px}
.ad-badge.default{background:#F5F5F5;color:var(--text3)}
.ad-badge.custom{background:#FFF4EC;color:var(--primary)}
.btn-del{width:26px;height:26px;border-radius:50%;border:none;background:#FEE;color:var(--red);font-size:12px;cursor:pointer}
.btn-publish{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-reset{flex:1;padding:12px;border:1.5px dashed #ddd;border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}

/* Diet hero */
.diet-hero{display:flex;align-items:center;gap:8px;padding:8px 16px 16px;font-size:12px;color:var(--text2)}
.diet-hero-icon{font-size:28px}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:var(--card);border-top:1px solid var(--border);z-index:99;display:flex;padding-bottom:var(--safe-b);box-shadow:0 -2px 12px rgba(0,0,0,.04)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:50px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500}
.tab-item .ti{font-size:20px}
.tab-item.active{color:var(--primary)}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:300;background:#333;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}

/* Dialog */
.d-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:none;align-items:center;justify-content:center}
.d-overlay.show{display:flex}
.d-box{background:#fff;border-radius:16px;padding:24px;width:280px;text-align:center}
.d-box p{font-size:15px;line-height:1.6;margin-bottom:20px}
.d-box .d-btns{display:flex;gap:10px}
.d-box .d-btns button{flex:1;padding:10px;border-radius:24px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.d-btn-cancel{background:#F0F0F0;color:#555}
.d-btn-ok{background:var(--red);color:#fff}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>🍳 今天吃啥</h1>
      <span class="header-badge" id="cartBadge">🛒 0</span>
    </div>
  </div>

  <div class="main">
    <!-- 点菜 -->
    <div class="page active" id="page-order">
      <div class="search-bar"><div class="search-wrap"><span class="s-icon">🔍</span><input id="searchInput" placeholder="搜菜品..." autocomplete="off" oninput="renderDishList()"></div></div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="filter-row">
        <span class="filter-chip active" data-filter="all" onclick="setFilter('all')">全部</span>
        <span class="filter-chip" data-filter="reheat" onclick="setFilter('reheat')">🍱带饭</span>
        <span class="filter-chip" data-filter="sichuan" onclick="setFilter('sichuan')">川菜</span>
        <span class="filter-chip" data-filter="canton" onclick="setFilter('canton')">粤菜</span>
      </div>
      <div class="dish-list" id="dishList"></div>
      <div class="section-title" style="margin:24px 14px 12px;font-size:16px;font-weight:700">已选菜品 <span style="font-size:13px;color:var(--text2);font-weight:400" id="cartCount"></span></div>
      <div class="dish-list" id="cartList"></div>
    </div>

    <!-- 盲盒 -->
    <div class="page" id="page-blindbox">
      <div class="bb-section">
        <span class="bb-icon" id="bbIcon">🎁</span>
        <h3>随机点菜盲盒</h3>
        <p>不知道吃什么？交给命运！</p>
        <div class="flavor-label">🎯 口味偏好（可多选）</div>
        <div class="flavor-grid" id="flavorGrid"></div>
        <div class="count-picker">
          <span style="font-size:14px;color:var(--text2)">抽</span>
          <button onclick="changeBBQty(-1)">−</button>
          <span class="pick-num" id="pickCount">2</span>
          <button onclick="changeBBQty(1)">+</button>
          <span style="font-size:14px;color:var(--text2)">道</span>
        </div>
        <button class="btn-roll" id="btnRoll" onclick="rollBB()">🎰 开 盲 盒</button>
        <div class="bb-result" id="bbResult"></div>
      </div>
    </div>

    <!-- 减脂 -->
    <div class="page" id="page-diet">
      <div class="search-bar"><div class="search-wrap"><span class="s-icon">🔍</span><input id="dietSearch" placeholder="搜减脂菜品..." autocomplete="off" oninput="renderDietPage()"></div></div>
      <div class="diet-hero"><span class="diet-hero-icon">🥗</span>减脂轻食 · 低卡高蛋白 · 日常食材</div>
      <div class="dish-list" id="dietDishList"></div>
    </div>

    <!-- 管理 -->
    <div class="page" id="page-admin">
      <div class="admin-lock" id="adminLock">
        <span class="lock-icon">🔐</span>
        <p style="margin-bottom:14px;color:var(--text2);font-size:14px">管理员验证</p>
        <input type="password" id="adminPw" placeholder="请输入管理密码" maxlength="20">
        <button class="btn-unlock" onclick="adminLogin()">验证进入</button>
        <div class="lock-error" id="lockError">密码错误</div>
      </div>
      <div class="admin-panel" id="adminPanel">
        <div class="admin-top"><h3>📝 菜单管理</h3><button class="btn-logout" onclick="adminLogout()">退出</button></div>
        <div class="add-form">
          <input id="newDishName" placeholder="菜品名称" maxlength="20">
          <input type="file" id="newDishImg" accept="image/*" style="display:none" onchange="previewNewImg()">
          <button class="btn-upload" onclick="document.getElementById('newDishImg').click()">📷</button>
          <button onclick="addDish()">➕ 添加</button>
        </div>
        <div id="uploadPreview" style="display:none;text-align:center;margin-bottom:10px">
          <img id="uploadPreviewImg" style="width:120px;height:90px;object-fit:cover;border-radius:8px;border:2px solid var(--primary-light)">
          <button onclick="clearUploadImg()" style="display:block;margin:4px auto 0;font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer">✕ 清除图片</button>
        </div>
        <div class="admin-stats" id="adminStats"></div>
        <div class="admin-dish-list" id="adminDishList"></div>
        <div style="display:flex;gap:8px;margin-top:16px"><button class="btn-publish" onclick="publishDishes()" id="btnPublish">📡 发布更新</button><button class="btn-reset" onclick="resetDishes()">🔄 恢复默认</button></div>
      </div>
    </div>
  </div>

  <!-- Cart bar -->
  <div class="cart-bar" id="cartBar" onclick="toggleCartDrawer()">
    <div class="cart-bar-inner">
      <div class="cart-icon-wrap"><div class="cart-icon" id="cartIcon">🛒</div><div class="cart-badge" id="cartDot" style="display:none">0</div></div>
      <div class="cart-info"><div class="cart-title" id="cartTitle">购物车是空的</div><div class="cart-hint" id="cartHint">挑选今晚和明天的菜吧</div></div>
      <span style="font-size:16px;color:var(--text3)">▸</span>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-item active" data-page="order" onclick="switchTab('order')"><span class="ti">📋</span>点菜</div>
    <div class="tab-item" data-page="blindbox" onclick="switchTab('blindbox')"><span class="ti">🎲</span>盲盒</div>
    <div class="tab-item" data-page="diet" onclick="switchTab('diet')"><span class="ti">🥗</span>减脂</div>
    <div class="tab-item" data-page="admin" onclick="switchTab('admin')"><span class="ti">⚙️</span>管理</div>
  </div>
</div>

<!-- Cart drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeCartDrawer()"></div>
<div class="drawer" id="cartDrawer">
  <div class="drawer-header"><h3>🛒 已选菜品</h3><button class="btn-clear" onclick="clearCart()">🗑 清空</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">
    <div class="drawer-total"><span id="drawerTotal"></span></div>
    <div class="drawer-actions"><button class="btn-copy" onclick="copyOrder()">📋 复制</button><button class="btn-done" id="btnDone" onclick="handleDone()">完成</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="d-overlay" id="dOverlay"><div class="d-box"><p id="dMsg"></p><div class="d-btns"><button class="d-btn-cancel" onclick="closeDialog()">取消</button><button class="d-btn-ok" id="dOk">确认</button></div></div></div>

<script>
// ===== DATA =====
const DEFAULT_DISHES = [

function cloneDefaults(){ return DEFAULT_DISHES.map(d=>({...d})); }

function esc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// ===== TAB =====
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelector('.tab-item[data-page="'+tab+'"]').classList.add('active');
  if(tab==='order') renderOrder();
  if(tab==='blindbox') renderBB();
  if(tab==='diet') renderDietPage();
  if(tab==='admin') renderAdmin();
}

// ===== ORDER PAGE =====
function getFilteredDishes(){
  let list = [...dishes];
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  if(search) list = list.filter(d=>d.n.toLowerCase().includes(search));
  if(activeCat!=='全部') list = list.filter(d=>d.c===activeCat);
  if(activeFilter==='reheat') list = list.filter(d=>d.r);
  if(activeFilter==='sichuan') list = list.filter(d=>d.cs==='川菜');
  if(activeFilter==='canton') list = list.filter(d=>d.cs==='粤菜');
  return list;
}

function renderCatTabs(){
  document.getElementById('catTabs').innerHTML = ['全部',...CAT_ORDER].map(c=>`<span class="cat-tab${activeCat===c?' active':''}" onclick="setCat('${c}')">${c}</span>`).join('');
}
function setCat(cat){ activeCat=cat; renderCatTabs(); renderDishList(); }
function setFilter(f){ activeFilter=f; document.querySelectorAll('.filter-chip').forEach(el=>el.classList.remove('active')); document.querySelector('.filter-chip[data-filter="'+f+'"]').classList.add('active'); renderDishList(); }

function renderOrder(){ renderCatTabs(); renderDishList(); renderCartSummary(); updateAllCartUI(); }

function renderDishList(){
  const list = getFilteredDishes();
  const el = document.getElementById('dishList');
  if(list.length===0){ el.innerHTML='<div class="empty"><div style="font-size:48px">🍽️</div>没有匹配的菜品</div>'; return; }
  el.innerHTML = list.map(d=>{
    const qty = (cart[d.n]||{}).qty||0;
    const g = CAT_GRADS[d.c]||CAT_GRADS['荤菜'];
    const rTag = d.r?'<span class="dish-tag reheat">🍱适合带饭</span>':'<span class="dish-tag noreheat">⏰现吃更佳</span>';
    return `<div class="dish-card"><div class="dish-img" style="--fb-bg:${g}"><img src="${dishImgUrl(d)}" alt="${d.n}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex'"><span class="fallback" style="display:none;background:${g}">${d.e}</span></div><div class="dish-info"><div class="dish-name">${d.n}</div><div class="dish-tags">${d.f.slice(0,2).map(f=>'<span class="dish-tag">'+f+'</span>').join('')}</div><div class="dish-foot"><span class="dish-reheat">${rTag}</span><div class="qty-ctrl">${qty>0?'<button class="btn-minus" onclick="changeQty(\''+esc(d.n)+'\',-1)">−</button><span class="qty-num">'+qty+'</span>':''}<button class="btn-plus" onclick="changeQty(\''+esc(d.n)+'\',1)">+</button></div></div></div></div>`;
  }).join('');
}

function renderCartSummary(){
  const entries = Object.entries(cart).filter(([,v])=>v.qty>0);
  const el = document.getElementById('cartList');
  document.getElementById('cartCount').textContent = entries.length+' 道';
  if(entries.length===0){ el.innerHTML='<div class="empty"><div style="font-size:40px">📋</div>还没有选菜</div>'; return; }
  el.innerHTML = entries.map(([n,v])=>`
    <div class="dish-card" style="padding:10px 14px">
      <span style="flex:1;font-weight:600">${n}</span>
      <span style="font-size:12px;color:var(--text2);margin-right:10px">${v.portion==='tonight'?'🍽️今晚':'🍱明午'}</span>
      <button class="btn-minus" style="width:24px;height:24px" onclick="changeQty('\${esc(n)}',-1)">−</button>
      <span style="margin:0 6px;font-weight:700;color:var(--primary)">${v.qty}</span>
      <button class="btn-plus" style="width:24px;height:24px" onclick="changeQty('\${esc(n)}',1)">+</button>
    </div>`).join('');
}

function changeQty(name, delta){
  name = unesc(name);
  if(!cart[name]) cart[name]={qty:0,portion:'tonight'};
  cart[name].qty+=delta;
  if(cart[name].qty<=0) delete cart[name];
  saveCart();
  renderOrder();
  if(document.getElementById('page-diet').classList.contains('active')) renderDietPage();
}

// ===== CART =====
function getCartEntries(){ return Object.entries(cart).filter(([,v])=>v.qty>0); }
function getCartTotal(){ return getCartEntries().reduce((s,[,v])=>s+v.qty,0); }
function updateAllCartUI(){
  const total=getCartTotal();
  document.getElementById('cartBadge').textContent=total>0?'🛒 '+total:'🛒 0';
  const icon=document.getElementById('cartIcon');
  const dot=document.getElementById('cartDot');
  if(total>0){ icon.classList.add('has-items'); dot.style.display='flex'; dot.textContent=total; document.getElementById('cartTitle').textContent='共 '+total+' 道菜'; document.getElementById('cartHint').textContent='点击查看菜单'; }
  else{ icon.classList.remove('has-items'); dot.style.display='none'; document.getElementById('cartTitle').textContent='购物车是空的'; document.getElementById('cartHint').textContent='挑选今晚和明天的菜吧'; }
}
function toggleCartDrawer(){
  const drawer=document.getElementById('cartDrawer');
  if(drawer.classList.contains('open')){ closeCartDrawer(); return; }
  renderCartDrawer(); drawer.classList.add('open'); document.getElementById('drawerOverlay').classList.add('show');
}
function closeCartDrawer(){ document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('show'); }
function renderCartDrawer(){
  const entries=getCartEntries();
  if(entries.length===0){ document.getElementById('drawerBody').innerHTML='<div class="empty">购物车是空的</div>'; return; }
  const tonight=entries.filter(([,v])=>v.portion==='tonight').reduce((s,[,v])=>s+v.qty,0);
  const tomorrow=entries.filter(([,v])=>v.portion==='tomorrow').reduce((s,[,v])=>s+v.qty,0);
  document.getElementById('drawerBody').innerHTML=entries.map(([n,v])=>`<div class="drawer-item"><span class="di-name">${n}</span><span class="di-portion ${v.portion==='tonight'?'eat-tonight':'pack-tomorrow'}" onclick="togglePortion('\${esc(n)}')">${v.portion==='tonight'?'🍽️今晚':'🍱明午'}</span><div class="di-qty"><button class="btn-minus" onclick="changeQtyDrawer('\${esc(n)}',-1)">−</button><span>${v.qty}</span><button class="btn-plus" onclick="changeQtyDrawer('\${esc(n)}',1)">+</button></div></div>`).join('');
  let s='共 '+getCartTotal()+' 道'; if(tonight>0) s+=' · 🍽️今晚'+tonight+'道'; if(tomorrow>0) s+=' · 🍱明午'+tomorrow+'道';
  document.getElementById('drawerTotal').innerHTML='<span>'+s+'</span>';
}
function changeQtyDrawer(name,delta){ changeQty(name,delta); renderCartDrawer(); updateAllCartUI(); }
function togglePortion(name){ name=unesc(name); if(!cart[name]) return; cart[name].portion=cart[name].portion==='tonight'?'tomorrow':'tonight'; saveCart(); renderCartDrawer(); }
function clearCart(){ if(getCartTotal()===0) return; showDialog('确定清空购物车？',()=>{ cart={}; saveCart(); renderOrder(); updateAllCartUI(); closeCartDrawer(); toast('已清空'); }); }

function copyOrder(){
  const entries=getCartEntries(); if(entries.length===0){ toast('购物车是空的'); return; }
  const tonight=entries.filter(([,v])=>v.portion==='tonight'), tomorrow=entries.filter(([,v])=>v.portion==='tomorrow');
  let text='🍳 点菜清单\n━━━━━━━━━━━━━━━━\n';
  if(tonight.length>0){ text+='\n🍽️ 今晚吃：\n'; tonight.forEach(([n,v])=>{ text+='  • '+n+' ×'+v.qty+'\n'; }); }
  if(tomorrow.length>0){ text+='\n🍱 明午带饭：\n'; tomorrow.forEach(([n,v])=>{ text+='  • '+n+' ×'+v.qty+'\n'; }); }
  text+='\n━━━━━━━━━━━━━━━━\n共 '+getCartTotal()+' 道菜';
  (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(text):new Promise(r=>{ const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);r();})).then(()=>toast('✅ 已复制')).catch(()=>toast('❌ 复制失败'));
}
async function handleDone(){
  if(pushing) return; pushing=true;
  const btn=document.getElementById('btnDone'); btn.textContent='...'; btn.disabled=true;
  copyOrder(); pushing=false; btn.textContent='完成'; btn.disabled=false; closeCartDrawer();
}

// ===== BLIND BOX =====
function renderBB(){
  document.getElementById('flavorGrid').innerHTML=FLAVORS.map(f=>`<span class="flavor-chip${bbFlavors.includes(f.k)?' active':''}" onclick="toggleFlavor('${f.k}')">${f.e} ${f.k}</span>`).join('');
  document.getElementById('pickCount').textContent=bbQty;
  document.getElementById('bbResult').innerHTML='';
}
function toggleFlavor(k){ const idx=bbFlavors.indexOf(k); if(idx>=0) bbFlavors.splice(idx,1); else bbFlavors.push(k); renderBB(); }
function changeBBQty(d){ bbQty=Math.max(1,Math.min(5,bbQty+d)); document.getElementById('pickCount').textContent=bbQty; }
function rollBB(){
  let pool=[...dishes];
  if(bbFlavors.length>0) pool=pool.filter(d=>d.f.some(f=>bbFlavors.includes(f)));
  if(pool.length===0){ toast('无匹配菜品'); return; }
  const n=Math.min(bbQty,pool.length);
  const icon=document.getElementById('bbIcon'), btn=document.getElementById('btnRoll');
  btn.disabled=true; icon.classList.add('rolling'); icon.textContent='🎰';
  let ticks=0;
  const iv=setInterval(()=>{ icon.textContent=['🎁','🎰','🎲','🍳','🥘','🍗','🐟','🍖'][Math.floor(Math.random()*8)]; ticks++; if(ticks>=14){ clearInterval(iv); bbResult=[...pool].sort(()=>Math.random()-.5).slice(0,n); icon.classList.remove('rolling'); icon.textContent='🎉'; showBBResult(); btn.disabled=false; } },90);
}
function showBBResult(){
  document.getElementById('bbResult').innerHTML=`<h4>🎯 为你抽中：</h4><div class="bb-result-dishes">${bbResult.map((d,i)=>'<span class="bb-res-dish" style="animation-delay:'+i*0.08+'s">'+d.e+' '+d.n+'</span>').join('')}</div><button class="btn-add-bb" onclick="addBBToCart()">📋 全部加入已选</button>`;
}
function addBBToCart(){ bbResult.forEach(d=>{ if(!cart[d.n]) cart[d.n]={qty:0,portion:'tonight'}; cart[d.n].qty+=1; }); saveCart(); updateAllCartUI(); toast('已添加 '+bbResult.length+' 道菜'); bbResult=[]; document.getElementById('bbResult').innerHTML=''; }

// ===== DIET PAGE =====
function renderDietPage(){
  const search=(document.getElementById('dietSearch').value||'').trim().toLowerCase();
  let list=dishes.filter(d=>d.c==='减脂');
  if(search) list=list.filter(d=>d.n.toLowerCase().includes(search));
  const el=document.getElementById('dietDishList');
  if(list.length===0){ el.innerHTML='<div class="empty"><div style="font-size:48px">🥗</div>没有匹配的减脂菜品</div>'; return; }
  el.innerHTML=list.map(d=>{
    const qty=(cart[d.n]||{}).qty||0;
    const g=CAT_GRADS['减脂'];
    const rTag=d.r?'<span class="dish-tag reheat">🍱适合带饭</span>':'<span class="dish-tag noreheat">⏰现吃更佳</span>';
    return `<div class="dish-card"><div class="dish-img" style="--fb-bg:${g}"><img src="${dishImgUrl(d)}" alt="${d.n}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex'"><span class="fallback" style="display:none;background:${g}">${d.e}</span></div><div class="dish-info"><div class="dish-name">${d.n}</div><div class="dish-tags">${d.f.filter(f=>f!=='减脂').slice(0,2).map(f=>'<span class="dish-tag">'+f+'</span>').join('')}</div><div class="dish-foot"><span class="dish-reheat">${rTag}</span><div class="qty-ctrl">${qty>0?'<button class="btn-minus" onclick="changeQty(\''+esc(d.n)+'\',-1)">−</button><span class="qty-num">'+qty+'</span>':''}<button class="btn-plus" onclick="changeQty(\''+esc(d.n)+'\',1)">+</button></div></div></div></div>`;
  }).join('');
}

// ===== ADMIN =====
function renderAdmin(){
  if(isAdmin){ document.getElementById('adminLock').style.display='none'; document.getElementById('adminPanel').classList.add('show'); renderAdminPanel(); }
  else{ document.getElementById('adminLock').style.display='block'; document.getElementById('adminPanel').classList.remove('show'); }
}
function adminLogin(){
  if(document.getElementById('adminPw').value===ADMIN_PW){ isAdmin=true; document.getElementById('adminPw').value=''; document.getElementById('lockError').style.display='none'; renderAdmin(); toast('✅ 验证成功'); }
  else{ document.getElementById('lockError').style.display='block'; document.getElementById('adminPw').value=''; }
}
function adminLogout(){ isAdmin=false; renderAdmin(); }
function renderAdminPanel(){
  const cats={}; CAT_ORDER.forEach(c=>{ cats[c]=dishes.filter(d=>d.c===c).length; });
  document.getElementById('adminStats').innerHTML=Object.entries(cats).map(([k,v])=>'<div class="admin-stat"><div class="as-num">'+v+'</div><div class="as-label">'+k+'</div></div>').join('');
  const isDef=d=>DEFAULT_DISHES.some(dd=>dd.n===d.n);
  document.getElementById('adminDishList').innerHTML=dishes.map(d=>`<div class="admin-dish-item"><span class="ad-name">${d.e} ${d.n}</span><span class="ad-badge ${isDef(d)?'default':'custom'}">${isDef(d)?'默认':'自定义'}</span><button class="btn-del" onclick="deleteDish('\${esc(d.n)}')">✕</button></div>`).join('');
}
function previewNewImg(){
  const file=document.getElementById('newDishImg').files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas'); const maxW=400; canvas.width=maxW; canvas.height=(img.height/img.width)*maxW;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      uploadedImgData=canvas.toDataURL('image/jpeg',0.7);
      document.getElementById('uploadPreviewImg').src=uploadedImgData;
      document.getElementById('uploadPreview').style.display='block';
    }; img.src=e.target.result;
  }; reader.readAsDataURL(file);
}
function clearUploadImg(){ uploadedImgData=null; document.getElementById('uploadPreview').style.display='none'; document.getElementById('newDishImg').value=''; }
function addDish(){
  const name=document.getElementById('newDishName').value.trim();
  if(!name){ toast('请输入菜品名称'); return; }
  if(dishes.some(d=>d.n===name)){ toast('该菜品已存在'); return; }
  const nd={n:name,c:'减脂',cs:'减脂',f:['清淡','减脂'],r:true,e:'🥗',en:name};
  if(uploadedImgData) nd.customImg=uploadedImgData;
  dishes.push(nd); saveDishes(); document.getElementById('newDishName').value=''; clearUploadImg(); renderAdminPanel(); toast('已添加：'+name);
}
function deleteDish(name){ name=unesc(name); showDialog('确定删除「'+name+'」？',()=>{ dishes=dishes.filter(d=>d.n!==name); if(cart[name]) delete cart[name]; saveDishes(); saveCart(); renderAdminPanel(); updateAllCartUI(); toast('已删除'); }); }
function resetDishes(){ showDialog('确定恢复默认200道菜？',()=>{ dishes=cloneDefaults(); saveDishes(); renderAdminPanel(); toast('已恢复'); }); }

// ===== PERSISTENCE =====
function saveDishes(){ localStorage.setItem('eatwhat_dishes',JSON.stringify(dishes)); }
function loadCart(){ const s=localStorage.getItem('eatwhat_cart'); if(s){ try{cart=JSON.parse(s)}catch(e){cart={}} } }
function saveCart(){ localStorage.setItem('eatwhat_cart',JSON.stringify(cart)); }

// ===== UTILS =====
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1800); }
function showDialog(msg,cb){ document.getElementById('dMsg').innerHTML=msg; document.getElementById('dOverlay').classList.add('show'); dialogCb=cb; document.getElementById('dOk').onclick=()=>{const c=dialogCb;closeDialog();if(c)c();}; }
function closeDialog(){ document.getElementById('dOverlay').classList.remove('show'); dialogCb=null; }

async function publishDishes(){
  const token='ghp_'+'ulKxs9t1h6fWk6nCF6IlhsBOhw38Ye4bATcg';
  toast('⏳ 发布中...');
  try{
    const getResp=await fetch('https://api.github.com/repos/ShenLiGuo/eatwhat/contents/dishes.json',{headers:{'Authorization':'token '+token}});
    if(!getResp.ok) throw new Error('GET '+getResp.status);
    const fi=await getResp.json();
    const payload={version:6,updated:new Date().toISOString().slice(0,10),dishes:dishes.map(d=>{const{customImg,...r}=d;return r;})};
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const putResp=await fetch('https://api.github.com/repos/ShenLiGuo/eatwhat/contents/dishes.json',{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify({message:'Update dishes',content:content,sha:fi.sha})});
    if(!putResp.ok) throw new Error('PUT '+putResp.status);
    document.getElementById('btnPublish').textContent='📡 发布更新';
    toast('✅ 已发布');
  }catch(e){ console.error(e); toast('❌ 发布失败'); }
}

document.getElementById('adminPw').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin();});
document.getElementById('newDishName').addEventListener('keydown',e=>{if(e.key==='Enter')addDish();});
</script>
