<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>今天吃啥 · 二人食</title>
<style>
/* ====== Reset ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#E8590C;--primary-dark:#D9480F;--primary-light:#FF8C42;
  --bg:#F8F8F8;--card:#fff;--text:#1a1a1a;--text2:#888;--text3:#bbb;
  --border:#F0F0F0;--divider:#F5F5F5;
  --red:#F03E3E;--green:#40C057;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 4px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.08);
  --safe-b:env(safe-area-inset-bottom,12px);
  --cart-h:56px;
  --meat-grad:linear-gradient(135deg,#FFF0E6,#FFDFC9);
  --veg-grad:linear-gradient(135deg,#E8F5E9,#CDE8D0);
  --seafood-grad:linear-gradient(135deg,#E3F2FD,#C5E3FC);
  --cold-grad:linear-gradient(135deg,#FFFDE7,#FFF9C4);
  --soup-grad:linear-gradient(135deg,#FFF3E0,#FFE4C4);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
  user-select:none;overflow-x:hidden;
}
.app{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100dvh;position:relative}

/* ====== Header ====== */
.header{
  position:sticky;top:0;z-index:90;
  background:linear-gradient(135deg,#E8590C,#D9480F);color:#fff;
  padding:14px 16px;box-shadow:0 2px 16px rgba(233,89,12,.2);
}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:19px;font-weight:700;letter-spacing:.3px}
.header-sub{font-size:12px;opacity:.85;margin-top:2px;display:flex;align-items:center;gap:4px}
.header-sub .dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:.6}
.header-badge{
  background:rgba(255,255,255,.22);padding:5px 12px;border-radius:20px;
  font-size:13px;font-weight:600;transition:all .2s;cursor:pointer
}
.header-badge:active{background:rgba(255,255,255,.35)}

/* ====== Main ====== */
.main{flex:1;padding-bottom:calc(var(--safe-b) + 120px)}

/* ====== Page ====== */
.page{display:none;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ====== Search ====== */
.search-bar{padding:10px 14px;background:var(--bg)}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:10px 14px 10px 38px;border:1.5px solid #eee;border-radius:24px;
  font-size:14px;background:var(--card);outline:none;transition:border .2s;color:var(--text)
}
.search-wrap input:focus{border-color:var(--primary-light)}
.search-wrap .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#ccc}
.search-wrap .s-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#ccc;
  border:none;background:none;cursor:pointer;display:none;padding:4px
}

/* ====== Category Tabs ====== */
.cat-tabs{
  display:flex;gap:8px;padding:6px 14px 12px;overflow-x:auto;scroll-behavior:smooth;
  -ms-overflow-style:none;scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;
  background:var(--card);color:var(--text2);border:1.5px solid var(--border);
  cursor:pointer;transition:all .2s;white-space:nowrap
}
.cat-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.cat-tab:active{transform:scale(.95)}

/* ====== Filter Row ====== */
.filter-row{display:flex;align-items:center;gap:8px;padding:0 14px 10px}
.filter-chip{
  font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:3px
}
.filter-chip.active{background:#FFF4EC;border-color:var(--primary-light);color:var(--primary);font-weight:600}
.filter-chip:active{transform:scale(.95)}

/* ====== Dish Card List ====== */
.dish-list{padding:0 14px}
.dish-card{
  display:flex;gap:12px;background:var(--card);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);
  transition:all .15s;cursor:pointer;position:relative
}
.dish-card:active{transform:scale(.985);background:#fefefe}
.dish-img{
  width:100px;min-height:100px;flex-shrink:0;position:relative;overflow:hidden;border-radius:8px 0 0 8px;background:#f0f0f0
}
.dish-img img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.dish-img .fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:44px;position:absolute;inset:0;background:var(--fb-bg, #FFF0E6)
}
.dish-info{flex:1;padding:12px 12px 12px 0;display:flex;flex-direction:column;justify-content:center;min-width:0}
.dish-name{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.dish-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.dish-tag{
  font-size:10px;padding:2px 7px;border-radius:10px;background:#F5F5F5;color:var(--text2);
  white-space:nowrap
}
.dish-tag.cuisine-sichuan{background:#FFF0E6;color:#D9480F}
.dish-tag.cuisine-canton{background:#E3F2FD;color:#1565C0}
.dish-tag.reheat{background:#E8F5E9;color:#2E7D32}
.dish-tag.noreheat{background:#FFF3E0;color:#E65100}
.dish-foot{display:flex;align-items:center;justify-content:space-between}
.dish-reheat{font-size:11px;display:flex;align-items:center;gap:2px}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-ctrl button{
  width:28px;height:28px;border-radius:50%;border:none;font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1
}
.btn-minus{background:#F0F0F0;color:#888}
.btn-plus{background:var(--primary);color:#fff}
.qty-ctrl button:active{transform:scale(.85)}
.qty-ctrl .qty-num{font-size:14px;font-weight:700;color:var(--primary);min-width:16px;text-align:center}

/* ====== Cart Bar (bottom float) ====== */
.cart-bar{
  position:fixed;bottom:calc(var(--safe-b) + 50px);left:50%;transform:translateX(-50%);max-width:480px;width:100%;
  background:var(--card);border-top:1px solid var(--border);z-index:100;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.cart-bar-inner{
  display:flex;align-items:center;padding:8px 14px;gap:12px;cursor:pointer;
}
.cart-bar:active .cart-bar-inner{background:#fafafa}
.cart-icon-wrap{position:relative;flex-shrink:0}
.cart-icon{
  width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#333,#555);
  display:flex;align-items:center;justify-content:center;font-size:20px
}
.cart-icon.has-items{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.cart-badge{
  position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
  font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;padding:0 4px
}
.cart-info{flex:1}
.cart-title{font-size:14px;font-weight:600}
.cart-hint{font-size:11px;color:var(--text2)}
.cart-arrow{font-size:16px;color:var(--text3)}

/* ====== Cart Drawer ====== */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;display:none;
  animation:fadeIn .2s
}
@keyframes fadeIn{from{opacity:0}}
.drawer-overlay.show{display:block}
.drawer{
  position:fixed;left:50%;transform:translateX(-50%) translateY(100%);max-width:480px;width:100%;
  bottom:0;z-index:151;background:var(--card);border-radius:20px 20px 0 0;
  max-height:65vh;display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.12)
}
.drawer.open{transform:translateX(-50%) translateY(0)}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;border-bottom:1px solid var(--divider)
}
.drawer-header h3{font-size:16px;font-weight:700}
.btn-clear{font-size:12px;color:var(--text2);border:none;background:none;cursor:pointer;padding:4px 8px}
.btn-clear:active{color:var(--red)}
.drawer-body{flex:1;overflow-y:auto;padding:8px 18px}
.drawer-item{
  display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--divider)
}
.drawer-item:last-child{border-bottom:none}
.drawer-item .di-name{flex:1;font-size:14px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drawer-item .di-qty{display:flex;align-items:center;gap:5px}
.drawer-item .di-qty button{width:24px;height:24px;font-size:13px}
.drawer-item .di-qty span{font-size:14px;font-weight:700;min-width:16px;text-align:center;color:var(--primary)}
.drawer-item .di-portion{
  font-size:11px;padding:3px 8px;border-radius:10px;cursor:pointer;transition:all .15s;
  border:1px solid var(--border);background:var(--card);color:var(--text2);white-space:nowrap
}
.drawer-item .di-portion.eat-tonight{background:#FFF4EC;color:#D9480F;border-color:#FFD4BA}
.drawer-item .di-portion.pack-tomorrow{background:#E8F5E9;color:#2E7D32;border-color:#B9DFC4}
.drawer-footer{
  padding:14px 18px calc(var(--safe-b) + 8px);border-top:1px solid var(--divider);
  display:flex;align-items:center;justify-content:space-between
}
.drawer-total{font-size:15px;font-weight:700}
.drawer-total span{font-size:12px;color:var(--text2);font-weight:400}
.btn-done{
  padding:10px 28px;border-radius:24px;border:none;background:var(--primary);
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s
}
.btn-done:active{background:var(--primary-dark);transform:scale(.95)}
.drawer-actions{display:flex;gap:8px}
.btn-copy{
  padding:10px 18px;border-radius:24px;border:1.5px solid var(--primary);
  background:#fff;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap
}
.btn-copy:active{background:var(--primary-bg, #FFF4EC)}
.btn-send{padding:10px 14px;border-radius:24px;border:none;background:#07C160;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-send:active{background:#06AD56}
.drawer-empty{text-align:center;padding:40px 0;color:var(--text3);font-size:14px}

/* ====== Blind Box ====== */
.bb-section{padding:16px}
.bb-hero{text-align:center;margin-bottom:20px}
.bb-hero .bb-icon{font-size:64px;display:block;margin-bottom:4px;transition:transform .5s}
.bb-hero .bb-icon.rolling{animation:shake .5s ease-in-out}
@keyframes shake{
  0%,100%{transform:rotate(0)}
  20%{transform:rotate(-12deg)}
  40%{transform:rotate(12deg)}
  60%{transform:rotate(-8deg)}
  80%{transform:rotate(8deg)}
}
.bb-hero h3{font-size:18px;font-weight:700;margin:4px 0}
.bb-hero p{font-size:13px;color:var(--text2)}

/* Flavor Chips */
.flavor-label{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.flavor-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.flavor-chip{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;
  border:1.5px solid var(--border);background:var(--card);cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:4px
}
.flavor-chip.active{
  background:#FFF4EC;border-color:var(--primary);color:var(--primary);font-weight:600;
  box-shadow:0 2px 8px rgba(233,89,12,.12)
}
.flavor-chip:active{transform:scale(.95)}

/* Count Picker */
.bb-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.bb-controls button{
  width:38px;height:38px;border-radius:50%;border:2px solid var(--border);
  background:var(--card);font-size:18px;cursor:pointer;font-weight:700;transition:all .15s
}
.bb-controls button:active{background:#FFF4EC;border-color:var(--primary-light)}
.bb-count{font-size:30px;font-weight:800;color:var(--primary);min-width:32px;text-align:center}
.bb-label{font-size:14px;color:var(--text2)}

.btn-roll{
  display:block;margin:0 auto;padding:14px 56px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 20px rgba(233,89,12,.3);transition:all .15s;letter-spacing:2px
}
.btn-roll:active{transform:scale(.94);box-shadow:0 3px 10px rgba(233,89,12,.2)}
.btn-roll:disabled{opacity:.5;pointer-events:none}

/* BB Result */
.bb-result{margin-top:20px;text-align:center}
.bb-result h4{font-size:15px;font-weight:700;margin-bottom:12px}
.bb-result-dishes{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:14px}
.bb-res-dish{
  background:var(--card);border:2px solid var(--primary-light);border-radius:var(--radius-sm);
  padding:8px 14px 8px 8px;font-size:14px;font-weight:600;color:var(--primary);
  animation:popIn .3s ease forwards;opacity:0;
  display:flex;align-items:center;gap:8px
}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.btn-add-bb{
  padding:10px 24px;border-radius:24px;border:2px solid var(--primary);
  background:#fff;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s
}
.btn-add-bb:active{background:var(--primary-bg, #FFF4EC)}

/* ====== Admin ====== */
.admin-lock{text-align:center;padding:48px 24px}
.admin-lock .lock-icon{font-size:52px;display:block;margin-bottom:12px}
.admin-lock input{
  width:100%;max-width:260px;padding:12px 16px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:15px;text-align:center;outline:none;margin-bottom:12px
}
.admin-lock input:focus{border-color:var(--primary-light)}
.lock-error{color:var(--red);font-size:13px;display:none;margin-top:6px}
.btn-unlock{
  display:block;width:100%;max-width:260px;margin:0 auto;padding:12px;border:none;
  border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer
}
.btn-unlock:active{opacity:.85}

.admin-panel{display:none;padding:14px}
.admin-panel.show{display:block}
.admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.admin-top h3{font-size:16px;font-weight:700}
.btn-logout{font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;padding:4px 8px}

.add-form{display:flex;gap:8px;margin-bottom:14px}
.add-form input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:22px;font-size:14px;outline:none}
.add-form input:focus{border-color:var(--primary-light)}
.add-form button{padding:10px 18px;border:none;border-radius:22px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-form button:active{opacity:.85}
.btn-upload{padding:10px 12px!important;border-radius:22px!important;background:#f0f0f0!important;color:#555!important;font-size:16px!important}

.admin-stats{display:flex;gap:8px;margin-bottom:14px}
.admin-stat{flex:1;text-align:center;padding:10px 6px;background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow)}
.admin-stat .as-num{font-size:22px;font-weight:800;color:var(--primary)}
.admin-stat .as-label{font-size:11px;color:var(--text2)}

.admin-dish-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto}
.admin-dish-item{
  display:flex;align-items:center;gap:8px;background:var(--card);padding:10px 12px;
  border-radius:var(--radius-sm);font-size:14px
}
.admin-dish-item .ad-name{flex:1;font-weight:500}
.admin-dish-item .ad-badge{
  font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap
}
.ad-badge.default{background:#F5F5F5;color:var(--text3)}
.ad-badge.custom{background:#FFF4EC;color:var(--primary)}
.btn-del{
  width:26px;height:26px;border-radius:50%;border:none;background:#FEE;color:var(--red);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center
}
.btn-del:active{background:#FDD}
.btn-edit-img{
  width:26px;height:26px;border-radius:50%;border:none;background:#F0F0F0;
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.btn-edit-img:active{background:#E0E0E0}

.btn-reset{
  margin-top:16px;width:100%;padding:12px;border:1.5px dashed #ddd;border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);font-size:13px;cursor:pointer
}
.btn-reset:active{border-color:var(--red);color:var(--red);background:#FFF5F5}
.btn-publish{
  flex:1;padding:12px;border:none;border-radius:var(--radius-sm);
  background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s
}
.btn-publish:active{background:var(--primary-dark)}
.btn-publish.has-changes{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(233,89,12,.4)}50%{box-shadow:0 0 0 8px rgba(233,89,12,0)}}

/* ====== Tab Bar ====== */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;
  background:var(--card);border-top:1px solid var(--border);z-index:99;
  display:flex;padding-bottom:var(--safe-b);box-shadow:0 -2px 12px rgba(0,0,0,.04)
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;height:50px;cursor:pointer;color:var(--text3);transition:all .2s;font-size:10px;font-weight:500
}
.tab-item .ti{font-size:20px;transition:transform .2s}
.tab-item.active{color:var(--primary)}
.tab-item.active .ti{transform:scale(1.08)}

/* ====== Toast ====== */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:300;
  background:#333;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;
  opacity:0;pointer-events:none;transition:opacity .25s
}
.toast.show{opacity:1}

/* ====== Confirm Dialog ====== */
.d-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:none;
  align-items:center;justify-content:center
}
.d-overlay.show{display:flex}
.d-box{background:#fff;border-radius:16px;padding:24px;width:280px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.d-box p{font-size:15px;line-height:1.6;margin-bottom:20px}
.d-box .d-btns{display:flex;gap:10px}
.d-box .d-btns button{flex:1;padding:10px;border-radius:24px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.d-btn-cancel{background:#F0F0F0;color:#555}
.d-btn-ok{background:var(--red);color:#fff}
.d-box .d-btns button:active{opacity:.8}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1>🍳 今天吃啥</h1>
      <span class="header-badge" id="cartBadge" onclick="toggleCartDrawer()">🛒 0道菜</span>
    </div>
    <div class="header-sub">🌙 晚餐<span class="dot"></span>👫 二人食<span class="dot"></span>🍱 明午带饭</div>
  </div>

  <div class="main">
    <!-- ===== PAGE: ORDER ===== -->
    <div class="page active" id="page-order">
      <div class="search-bar">
        <div class="search-wrap">
          <span class="s-icon">🔍</span>
          <input id="searchInput" placeholder="搜菜品..." autocomplete="off">
          <button class="s-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
      </div>

      <div class="cat-tabs" id="catTabs"></div>
      <div class="filter-row">
        <span style="font-size:12px;color:var(--text2);flex-shrink:0">筛选:</span>
        <span class="filter-chip active" data-filter="all" onclick="setFilter('all')">全部</span>
        <span class="filter-chip" data-filter="reheat" onclick="setFilter('reheat')">🍱 适合带饭</span>

function cloneDefaults(){ return DEFAULT_DISHES.map(d=>({...d})); }

async function loadDishes(){
  // Load local immediately first
  const s = localStorage.getItem(STORAGE_DISHES);
  if(s){ try{ dishes = JSON.parse(s); }catch(e){ dishes = cloneDefaults(); } }
  else dishes = cloneDefaults();
  if(!Array.isArray(dishes) || dishes.length===0) dishes = cloneDefaults();

  // Try remote sync with short timeout (don't block)
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    const resp = await fetch(REMOTE_DISHES_URL + '?t=' + Date.now(), {cache:'no-cache', signal: ctrl.signal});
    clearTimeout(timer);
    if(resp.ok){
      const data = await resp.json();
      if(data && data.dishes && Array.isArray(data.dishes)){
        remoteVersion = data.version || 0;
        const localVer = parseInt(localStorage.getItem(STORAGE_DISH_VER) || '0');
        if(remoteVersion > localVer){
          dishes = data.dishes;
          localStorage.setItem(STORAGE_DISHES, JSON.stringify(dishes));
          localStorage.setItem(STORAGE_DISH_VER, String(remoteVersion));
          console.log('📡 已同步最新菜单 v' + remoteVersion);
          renderOrder();
          updateAllCartUI();
        }
      }
    }
  }catch(e){ console.log('⚠️ 远程同步跳过，使用本地缓存'); }
}

    const getResp = await fetch(GH_API_URL, {headers:{Authorization:'token '+token}});
    if(!getResp.ok) throw new Error('GET failed: '+getResp.status);
    const fileInfo = await getResp.json();
    const sha = fileInfo.sha;

    // Prepare new data
    const newVersion = (remoteVersion || 0) + 1;
    const payload = {
      version: newVersion,
      updated: new Date().toISOString().slice(0,10),
      dishes: dishes
    };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));

    // Commit
    const putResp = await fetch(GH_API_URL, {
      method:'PUT',
      headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body: JSON.stringify({message:'Update dishes to v'+newVersion, content:content, sha:sha})
    });
    if(!putResp.ok) throw new Error('PUT failed: '+putResp.status);

    remoteVersion = newVersion;
    localStorage.setItem(STORAGE_DISH_VER, String(newVersion));
    adminHasPendingChanges = false;
    const btn = document.getElementById('btnPublish');
    if(btn){ btn.classList.remove('has-changes'); btn.textContent = '📡 发布更新'; }
    toast('✅ 已发布！其他人刷新即可看到更新');
  }catch(e){
    console.error(e);
    toast('❌ 发布失败: '+e.message);
  }
}

  if(activeFilter==='reheat'){ list = list.filter(d=>d.r); }
  if(activeFilter==='sichuan'){ list = list.filter(d=>d.cs==='川菜'); }
  if(activeFilter==='canton'){ list = list.filter(d=>d.cs==='粤菜'); } if(activeFilter==='diet'){ list = list.filter(d=>d.c==='减脂'); }

function changeQty(name, delta){

  saveCart();
  renderDishList();
  updateAllCartUI();
}

function getCartEntries(){ return Object.entries(cart).filter(([,v])=>v.qty>0); }
function getCartTotal(){ return getCartEntries().reduce((s,[,v])=>s+v.qty,0); }

function updateAllCartUI(){

    document.getElementById('cartHint').textContent='点击查看菜单';

    dot.style.display='none';
    document.getElementById('cartTitle').textContent='购物车是空的';
    document.getElementById('cartHint').textContent='挑选今晚和明天的菜吧';

function toggleCartDrawer(){

  const overlay = document.getElementById('drawerOverlay');
  if(drawer.classList.contains('open')){ closeCartDrawer(); return; }
  renderCartDrawer();
  drawer.classList.add('open');
  overlay.classList.add('show');
}
function closeCartDrawer(){
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('show');
}

function renderCartDrawer(){
  const entries = getCartEntries();
  const body = document.getElementById('drawerBody');
  if(entries.length===0){
    body.innerHTML='<div class="drawer-empty"><div style="font-size:40px;margin-bottom:8px">🛒</div>购物车是空的</div>';
    document.getElementById('drawerTotal').innerHTML='';
    return;
  }
  const tonight = entries.filter(([,v])=>v.portion==='tonight').reduce((s,[,v])=>s+v.qty,0);
  const tomorrow = entries.filter(([,v])=>v.portion==='tomorrow').reduce((s,[,v])=>s+v.qty,0);
  body.innerHTML = entries.map(([name,v])=>`
    <div class="drawer-item">
      <span class="di-name">${name}</span>
      <span class="di-portion ${v.portion==='tonight'?'eat-tonight':'pack-tomorrow'}" onclick="togglePortion('${esc(name)}')">
        ${v.portion==='tonight'?'🍽️ 今晚':'🍱 明午'}
      </span>
      <div class="di-qty">
        <button class="btn-minus" onclick="changeQtyDrawer('${esc(name)}',-1)">−</button>
        <span>${v.qty}</span>
        <button class="btn-plus" onclick="changeQtyDrawer('${esc(name)}',1)">+</button>
      </div>
    </div>
  `).join('');
  let summary = `<span>共 ${getCartTotal()} 道</span>`;
  if(tonight>0) summary += ` · 🍽️今晚${tonight}道`;
  if(tomorrow>0) summary += ` · 🍱明午${tomorrow}道`;
  document.getElementById('drawerTotal').innerHTML = summary;
}

function changeQtyDrawer(name, delta){
  changeQty(name, delta);
  renderCartDrawer();
  updateAllCartUI();
}
function togglePortion(name){
  name = unesc(name);
  if(!cart[name]) return;
  cart[name].portion = cart[name].portion==='tonight'?'tomorrow':'tonight';

  renderCartDrawer();
  updateAllCartUI();

function copyOrder(){
  const entries = getCartEntries();
  if(entries.length===0){ toast('购物车是空的'); return; }
  const tonight = entries.filter(([,v])=>v.portion==='tonight');
  const tomorrow = entries.filter(([,v])=>v.portion==='tomorrow');
  let text = '🍳 今天吃啥 · 晚餐清单\n━━━━━━━━━━━━━━━━\n';
  if(tonight.length>0){
    text += '\n🍽️ 今晚吃：\n';
    tonight.forEach(([n,v])=>{ text += `  • ${n} ×${v.qty}\n`; });
  }
  if(tomorrow.length>0){
    text += '\n🍱 明午带饭：\n';
    tomorrow.forEach(([n,v])=>{ text += `  • ${n} ×${v.qty}\n`; });
  }
  text += `\n━━━━━━━━━━━━━━━━\n共 ${getCartTotal()} 道菜 · 二人食`;
  // Try clipboard API, fallback to prompt
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('✅ 已复制，去微信粘贴吧！')).catch(()=>fallbackCopy(text));
  }else{
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  toast('✅ 已复制，去微信粘贴吧！');
}

function changeBBQty(d){
  bbQty = Math.max(1, Math.min(5, bbQty + d));
  document.getElementById('bbCount').textContent = bbQty;
}

function rollBB(){
  // Filter pool
  let pool = [...dishes];
  if(bbFlavors.length > 0){
    pool = pool.filter(d=> d.f.some(f=>bbFlavors.includes(f)));
  }
  if(pool.length===0){ toast('没有匹配口味的菜品，请调整筛选'); return; }

  const n = Math.min(bbQty, pool.length);
  const icon = document.getElementById('bbIcon');
  const btn = document.getElementById('btnRoll');
  btn.disabled = true;
  icon.classList.add('rolling');
  icon.textContent = '🎰';

  let ticks=0;
  const maxTicks=14;
  const iv = setInterval(()=>{
    icon.textContent = ['🎁','🎰','🎲','🍳','🥘','🍗','🐟','🍖'][Math.floor(Math.random()*8)];
    ticks++;
    if(ticks>=maxTicks){
      clearInterval(iv);
      const shuffled = [...pool].sort(()=>Math.random()-.5);
      bbResult = shuffled.slice(0, n);
      icon.classList.remove('rolling');
      icon.textContent = '🎉';
      showBBResult();
      btn.disabled = false;
    }
  }, 90);
}

function showBBResult(){
  document.getElementById('bbResult').innerHTML = `
    <h4>🎯 为你抽中：</h4>
    <div class="bb-result-dishes">
      ${bbResult.map((d,i)=>`<div class="bb-res-dish" style="animation-delay:${i*0.08}s"><img src="${dishImgUrl(d)}" alt="${d.n}" loading="lazy" onerror="this.style.display='none'" style="width:48px;height:48px;border-radius:8px;object-fit:cover"><span>${d.n}</span></div>`).join('')}
    </div>
    <button class="btn-add-bb" onclick="addBBToCart()">📋 全部加入购物车</button>
  `;
}

function addBBToCart(){
  bbResult.forEach(d=>{
    if(!cart[d.n]) cart[d.n]={qty:0,portion:'tonight'};
    cart[d.n].qty += 1;
  });
  saveCart(); updateAllCartUI();
  toast(`已添加 ${bbResult.length} 道菜！`);
  bbResult=[]; document.getElementById('bbResult').innerHTML='';
}

let uploadedImgData = null;

function previewNewImg(){
  const file = document.getElementById('newDishImg').files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    // Resize image to save storage space
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxW = 400; canvas.width = maxW;
      canvas.height = (img.height / img.width) * maxW;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      uploadedImgData = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('uploadPreviewImg').src = uploadedImgData;
      document.getElementById('uploadPreview').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearUploadImg(){
  uploadedImgData = null;
  document.getElementById('uploadPreview').style.display = 'none';
  document.getElementById('newDishImg').value = '';
}

function addDish(){
  const input = document.getElementById('newDishName');
  const name = input.value.trim();
  if(!name){ toast('请输入菜品名称'); return; }
  if(dishes.some(d=>d.n===name)){ toast('该菜品已存在'); return; }
  const cat = detectCat(name);
  const newDish = {n:name,c:cat,cs:'川菜',f:['酱香'],r:true,e:'🍽️',en:name};
  if(uploadedImgData) newDish.customImg = uploadedImgData;
  dishes.push(newDish);
  saveDishes(); input.value=''; clearUploadImg(); renderAdminPanel();
  toast(`已添加：${name}`);
}

function changeDishImg(dishName){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = function(){
    const file = inp.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        const canvas = document.createElement('canvas');
        const maxW = 400; canvas.width = maxW;
        canvas.height = (img.height / img.width) * maxW;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const d = dishes.find(dd=>dd.n===dishName);
        if(d){ d.customImg = canvas.toDataURL('image/jpeg', 0.7); saveDishes(); renderAdminPanel(); toast('✅ 图片已更新'); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
function detectCat(name){
  if(/菜|豆|椒|茄|瓜|笋|菇|莲|花|薯|豆|腐/.test(name) && !/肉|鸡|鸭|鱼|虾|蟹|牛|猪|羊|贝|蛤|排|肠|血|蛋/.test(name)) return '素菜';
  if(/鱼|虾|蟹|贝|蛤|鲈|鳗|鲍|参/.test(name)) return '海鲜';
  if(/汤|煲/.test(name)) return '汤煲';
  if(/凉|拌/.test(name)) return '凉菜';
  return '荤菜';
}

function deleteDish(name){
  name = unesc(name);
  showDialog(`确定要删除「${name}」吗？`,()=>{
    dishes = dishes.filter(d=>d.n!==name);
    if(cart[name]) delete cart[name];
    saveDishes(); saveCart(); renderAdminPanel(); updateAllCartUI();
    toast(`已删除：${name}`);
  });
}

function unesc(s){ return s.replace(/\\\\/g,'\\').replace(/\\'/g,"'").replace(/\\"/g,'"'); }
